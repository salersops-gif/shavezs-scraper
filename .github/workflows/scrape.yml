name: LeadEngine — Scrape Job

on:
  repository_dispatch:
    types: [scrape-job]

jobs:
  scrape:
    name: Run Playwright Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Generate Prisma Client
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx prisma generate

      - name: Run scrape runner
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          JOB_ID: ${{ github.event.client_payload.jobId }}
          KEYWORD: ${{ github.event.client_payload.keyword }}
          LOCATION: ${{ github.event.client_payload.location }}
          MAX_RESULTS: ${{ github.event.client_payload.maxResults }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
          CONTACTOUT_API_KEY: ${{ secrets.CONTACTOUT_API_KEY }}
          VERIFALIA_USERNAME: ${{ secrets.VERIFALIA_USERNAME }}
          VERIFALIA_PASSWORD: ${{ secrets.VERIFALIA_PASSWORD }}
        run: node scripts/scrape-runner.js
